<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SolveSpace – Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue: #3a6cf4;
      --blue-light: #8ac4ff;
      --bg: #f5f7ff;
      --card: #ffffff;
      --text: #1a1f36;
      --muted: #6b7280;
      --border: #e5e7eb;
      --error: #dc2626;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* NAV — matches main site */
    nav {
      background: linear-gradient(120deg, #3a6cf4, #8ac4ff);
      padding: 14px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-logo { font-size: 1.4rem; font-weight: 700; color: white; text-decoration: none; }
    .nav-back { color: rgba(255,255,255,0.85); font-size: 0.85rem; text-decoration: none; display: flex; align-items: center; gap: 6px; transition: color 0.2s; }
    .nav-back:hover { color: white; }

    /* MAIN */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      position: relative;
      overflow: hidden;
    }

    /* Decorative blobs */
    main::before, main::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      pointer-events: none;
    }
    main::before { width: 500px; height: 500px; background: #3a6cf4; top: -100px; left: -100px; }
    main::after  { width: 400px; height: 400px; background: #8ac4ff; bottom: -100px; right: -100px; }

    /* CARD */
    .login-card {
      background: var(--card);
      border-radius: 20px;
      padding: 2.5rem 2.25rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(58,108,244,0.12), 0 4px 16px rgba(0,0,0,0.06);
      position: relative;
      z-index: 1;
      animation: slideUp 0.45s ease both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-logo {
      width: 52px; height: 52px;
      background: linear-gradient(135deg, #3a6cf4, #8ac4ff);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem;
      margin-bottom: 1.25rem;
      box-shadow: 0 4px 14px rgba(58,108,244,0.3);
    }

    .login-card h1 { font-size: 1.6rem; font-weight: 700; color: var(--text); margin-bottom: 0.3rem; }
    .login-card .subtitle { font-size: 0.85rem; color: var(--muted); margin-bottom: 1.75rem; }

    .demo-hint {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 10px;
      padding: 10px 14px;
      margin-bottom: 1.25rem;
      font-size: 0.8rem;
      color: #1d4ed8;
      line-height: 1.6;
    }
    .demo-hint strong { display: block; margin-bottom: 3px; }
    .demo-hint code { background: rgba(29,78,216,0.1); padding: 1px 5px; border-radius: 4px; font-family: monospace; }

    .field { margin-bottom: 1rem; }
    .field label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .field input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.9rem;
      color: var(--text);
      background: #fafafa;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    .field input:focus {
      border-color: var(--blue);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(58,108,244,0.12);
    }

    #login-error { font-size: 0.8rem; color: var(--error); min-height: 1.2em; margin-bottom: 0.75rem; }

    .btn-signin {
      width: 100%;
      padding: 13px;
      background: linear-gradient(120deg, #3a6cf4, #5b8cf7);
      color: white;
      font-family: 'Poppins', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 14px rgba(58,108,244,0.35);
    }
    .btn-signin:hover { opacity: 0.92; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(58,108,244,0.4); }
    .btn-signin:active { transform: translateY(0); }

    .divider { text-align: center; color: var(--muted); font-size: 0.75rem; margin-top: 1.25rem; }

    footer { text-align: center; padding: 1rem; font-size: 0.75rem; color: var(--muted); }
    footer a { color: var(--blue); text-decoration: none; }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">SolveSpace</a>
    <a href="index.html" class="nav-back">← Back to Home</a>
  </nav>

  <main>
    <div class="login-card">
      <div class="card-logo">📐</div>
      <h1>Welcome back</h1>
      <p class="subtitle">Sign in to access your SolveSpace dashboard</p>

      <div class="demo-hint">
        <strong>Demo credentials (for judges)</strong>
        Username: <code>student</code> &nbsp;·&nbsp; Password: <code>fbla2026</code>
      </div>

      <form id="loginForm" novalidate>
        <div class="field">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Enter your username" autocomplete="username">
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
        </div>
        <p id="login-error"></p>
        <button type="submit" class="btn-signin">Sign In →</button>
      </form>

      <p class="divider">Demo only — no real accounts stored</p>
    </div>
  </main>

  <footer>© 2026 SolveSpace · Student-led math tutoring · <a href="index.html">Home</a></footer>

  <script>
    document.getElementById("loginForm").addEventListener("submit", function(e) {
      e.preventDefault();
      const user = document.getElementById("username").value.trim();
      const pass = document.getElementById("password").value.trim();
      const error = document.getElementById("login-error");

      if (!user || !pass) { error.textContent = "⚠️ Please enter both a username and password."; return; }

      if (user === "student" && pass === "fbla2026") {
        error.textContent = "";
        const btn = document.querySelector(".btn-signin");
        btn.textContent = "✓ Signing in…";
        btn.style.background = "linear-gradient(120deg, #16a34a, #22c55e)";
        setTimeout(() => window.location.href = "index.html#dashboard", 700);
      } else {
        error.textContent = "❌ Incorrect credentials. Use the demo hint above.";
        document.getElementById("password").value = "";
        document.getElementById("password").focus();
      }
    });
  </script>

</body>
</html>
