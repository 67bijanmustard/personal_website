<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SolveSpace – Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue: #3a6cf4;
      --bg: #f5f7ff;
      --card: #ffffff;
      --text: #1a1f36;
      --muted: #6b7280;
      --border: #e5e7eb;
      --error: #dc2626;
      --green: #16a34a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Poppins', sans-serif; background: var(--bg); min-height: 100vh; display: flex; flex-direction: column; }

    nav {
      background: linear-gradient(120deg, #3a6cf4, #8ac4ff);
      padding: 14px 32px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-logo { font-size: 1.4rem; font-weight: 700; color: white; text-decoration: none; }
    .nav-back { color: rgba(255,255,255,0.85); font-size: 0.85rem; text-decoration: none; transition: color 0.2s; }
    .nav-back:hover { color: white; }

    main {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 2rem 1rem; position: relative; overflow: hidden;
    }
    main::before, main::after {
      content: ''; position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.15; pointer-events: none;
    }
    main::before { width: 500px; height: 500px; background: #3a6cf4; top: -100px; left: -100px; }
    main::after  { width: 400px; height: 400px; background: #8ac4ff; bottom: -100px; right: -100px; }

    .login-card {
      background: var(--card); border-radius: 20px; padding: 2.5rem 2.25rem;
      width: 100%; max-width: 420px;
      box-shadow: 0 20px 60px rgba(58,108,244,0.12), 0 4px 16px rgba(0,0,0,0.06);
      position: relative; z-index: 1;
      animation: slideUp 0.45s ease both;
    }
    @keyframes slideUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }

    .card-logo {
      width: 52px; height: 52px;
      background: linear-gradient(135deg, #3a6cf4, #8ac4ff);
      border-radius: 14px; display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; margin-bottom: 1.25rem;
      box-shadow: 0 4px 14px rgba(58,108,244,0.3);
    }
    .login-card h1 { font-size: 1.6rem; font-weight: 700; color: var(--text); margin-bottom: 0.3rem; }
    .login-card .subtitle { font-size: 0.85rem; color: var(--muted); margin-bottom: 1.75rem; }

    .tab-toggle {
      display: flex; background: #f3f4f6; border-radius: 10px; padding: 4px;
      margin-bottom: 1.5rem; gap: 4px;
    }
    .tab-toggle button {
      flex: 1; padding: 8px; border: none; border-radius: 7px;
      font-family: 'Poppins', sans-serif; font-size: 0.82rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s; color: var(--muted); background: none;
    }
    .tab-toggle button.active { background: white; color: var(--blue); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }

    .field { margin-bottom: 1rem; }
    .field label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .field input {
      width: 100%; padding: 11px 14px;
      border: 1.5px solid var(--border); border-radius: 10px;
      font-family: 'Poppins', sans-serif; font-size: 0.9rem; color: var(--text);
      background: #fafafa; outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field input:focus { border-color: var(--blue); background: #fff; box-shadow: 0 0 0 3px rgba(58,108,244,0.12); }

    .error-msg   { font-size: 0.8rem; color: var(--error); min-height: 1.2em; margin-bottom: 0.75rem; }
    .success-msg { font-size: 0.8rem; color: var(--green); min-height: 1.2em; margin-bottom: 0.75rem; }

    .btn-primary {
      width: 100%; padding: 13px;
      background: linear-gradient(120deg, #3a6cf4, #5b8cf7);
      color: white; font-family: 'Poppins', sans-serif; font-size: 0.95rem; font-weight: 600;
      border: none; border-radius: 10px; cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      box-shadow: 0 4px 14px rgba(58,108,244,0.35);
    }
    .btn-primary:hover { opacity: 0.92; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 1.25rem 0; color: var(--muted); font-size: 0.75rem;
    }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .btn-google {
      width: 100%; padding: 11px;
      background: white; border: 1.5px solid var(--border); border-radius: 10px;
      font-family: 'Poppins', sans-serif; font-size: 0.9rem; font-weight: 500; color: var(--text);
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .btn-google:hover { border-color: #d1d5db; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }

    .forgot-link { font-size: 0.78rem; color: var(--blue); text-decoration: none; display: block; text-align: right; margin-top: -6px; margin-bottom: 1rem; cursor: pointer; }
    .forgot-link:hover { text-decoration: underline; }

    footer { text-align: center; padding: 1rem; font-size: 0.75rem; color: var(--muted); }
    footer a { color: var(--blue); text-decoration: none; }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">SolveSpace</a>
  <a href="index.html" class="nav-back">← Back to Home</a>
</nav>

<main>
  <div class="login-card">
    <div class="card-logo">📐</div>
    <h1 id="card-title">Welcome back</h1>
    <p class="subtitle" id="card-subtitle">Sign in to access your SolveSpace dashboard</p>

    <div class="tab-toggle">
      <button class="active" id="tab-si" onclick="switchTab('signin')">Sign In</button>
      <button id="tab-su" onclick="switchTab('signup')">Create Account</button>
    </div>

    <!-- SIGN IN -->
    <div id="signin-form">
      <div class="field">
        <label for="si-email">Email</label>
        <input type="email" id="si-email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="field">
        <label for="si-password">Password</label>
        <input type="password" id="si-password" placeholder="Enter your password" autocomplete="current-password">
      </div>
      <span class="forgot-link" onclick="handleForgot()">Forgot password?</span>
      <p class="error-msg" id="si-error"></p>
      <p class="success-msg" id="si-success"></p>
      <button class="btn-primary" id="si-btn" onclick="handleSignIn()">Sign In →</button>
      <div class="divider">or</div>
      <button class="btn-google" onclick="handleGoogle()">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.32-8.16 2.32-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Continue with Google
      </button>
    </div>

    <!-- SIGN UP -->
    <div id="signup-form" style="display:none;">
      <div class="field">
        <label for="su-name">Full Name</label>
        <input type="text" id="su-name" placeholder="Your name" autocomplete="name">
      </div>
      <div class="field">
        <label for="su-email">Email</label>
        <input type="email" id="su-email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="field">
        <label for="su-password">Password</label>
        <input type="password" id="su-password" placeholder="At least 6 characters" autocomplete="new-password">
      </div>
      <p class="error-msg" id="su-error"></p>
      <p class="success-msg" id="su-success"></p>
      <button class="btn-primary" id="su-btn" onclick="handleSignUp()">Create Account →</button>
      <div class="divider">or</div>
      <button class="btn-google" onclick="handleGoogle()">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.32-8.16 2.32-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Sign up with Google
      </button>
    </div>

  </div>
</main>

<footer>© 2026 SolveSpace · <a href="index.html">Home</a></footer>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>
  // ── FIREBASE SETUP ────────────────────────────────────────
  const firebaseConfig = {
    apiKey:            "AIzaSyBCb0Cklt60pdxBE7oLuyuGlYdJoK4iqSk",
    authDomain:        "dv-peer-tutoring.firebaseapp.com",
    projectId:         "dv-peer-tutoring",
    storageBucket:     "dv-peer-tutoring.firebasestorage.app",
    messagingSenderId: "213126769176",
    appId:             "1:213126769176:web:a89c92a8c1f80096cc316d"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  // Redirect if already logged in
  auth.onAuthStateChanged(function(user) {
    if (user) {
      saveSessionAndRedirect(user);
    }
  });

  // ── HELPERS ───────────────────────────────────────────────
  function saveSessionAndRedirect(user) {
    localStorage.setItem('ss-session', JSON.stringify({
      loggedIn: true,
      username: user.displayName || user.email.split('@')[0],
      email: user.email
    }));
    window.location.href = 'index.html#dashboard';
  }

  function friendlyError(code) {
    const map = {
      'auth/user-not-found':       '❌ No account found with that email.',
      'auth/wrong-password':       '❌ Incorrect password. Please try again.',
      'auth/invalid-credential':   '❌ Incorrect email or password.',
      'auth/invalid-email':        '❌ Please enter a valid email address.',
      'auth/email-already-in-use': '❌ An account with that email already exists.',
      'auth/weak-password':        '❌ Password must be at least 6 characters.',
      'auth/too-many-requests':    '❌ Too many attempts. Please wait a moment.',
      'auth/network-request-failed': '❌ Network error. Check your connection.',
      'auth/popup-closed-by-user': '❌ Sign-in popup was closed. Please try again.',
    };
    return map[code] || '❌ Something went wrong. Please try again.';
  }

  function setLoading(btnId, loading, defaultText) {
    const btn = document.getElementById(btnId);
    btn.disabled = loading;
    btn.textContent = loading ? 'Please wait…' : defaultText;
  }

  // ── TAB SWITCHING ─────────────────────────────────────────
  function switchTab(tab) {
    const isSignin = tab === 'signin';
    document.getElementById('signin-form').style.display = isSignin ? '' : 'none';
    document.getElementById('signup-form').style.display = isSignin ? 'none' : '';
    document.getElementById('tab-si').classList.toggle('active', isSignin);
    document.getElementById('tab-su').classList.toggle('active', !isSignin);
    document.getElementById('card-title').textContent    = isSignin ? 'Welcome back' : 'Create your account';
    document.getElementById('card-subtitle').textContent = isSignin
      ? 'Sign in to access your SolveSpace dashboard'
      : 'Start learning math with SolveSpace today';
    ['si-error','si-success','su-error','su-success'].forEach(id => {
      document.getElementById(id).textContent = '';
    });
  }

  // ── SIGN IN ───────────────────────────────────────────────
  function handleSignIn() {
    const email = document.getElementById('si-email').value.trim();
    const pass  = document.getElementById('si-password').value;
    const errEl = document.getElementById('si-error');
    errEl.textContent = '';

    if (!email) { errEl.textContent = '⚠️ Please enter your email.'; return; }
    if (!pass)  { errEl.textContent = '⚠️ Please enter your password.'; return; }

    setLoading('si-btn', true, 'Sign In →');

    auth.signInWithEmailAndPassword(email, pass)
      .then(result => saveSessionAndRedirect(result.user))
      .catch(err => {
        errEl.textContent = friendlyError(err.code);
        document.getElementById('si-password').value = '';
        setLoading('si-btn', false, 'Sign In →');
      });
  }

  // ── SIGN UP ───────────────────────────────────────────────
  function handleSignUp() {
    const name  = document.getElementById('su-name').value.trim();
    const email = document.getElementById('su-email').value.trim();
    const pass  = document.getElementById('su-password').value;
    const errEl = document.getElementById('su-error');
    const sucEl = document.getElementById('su-success');
    errEl.textContent = '';
    sucEl.textContent = '';

    if (!name)           { errEl.textContent = '⚠️ Please enter your name.'; return; }
    if (!email)          { errEl.textContent = '⚠️ Please enter an email.'; return; }
    if (pass.length < 6) { errEl.textContent = '⚠️ Password must be at least 6 characters.'; return; }

    setLoading('su-btn', true, 'Create Account →');

    auth.createUserWithEmailAndPassword(email, pass)
      .then(result => result.user.updateProfile({ displayName: name }).then(() => result.user))
      .then(user => {
        sucEl.textContent = '✅ Account created! Redirecting…';
        saveSessionAndRedirect(user);
      })
      .catch(err => {
        errEl.textContent = friendlyError(err.code);
        setLoading('su-btn', false, 'Create Account →');
      });
  }

  // ── GOOGLE SIGN IN — popup method ────────────────────────
  function handleGoogle() {
    const provider = new firebase.auth.GoogleAuthProvider();
    provider.addScope('email');
    provider.addScope('profile');
    auth.signInWithPopup(provider)
      .then(function(result) {
        saveSessionAndRedirect(result.user);
      })
      .catch(function(err) {
        console.error('Google sign-in error:', err);
        document.getElementById('si-error').textContent = friendlyError(err.code);
      });
  }

  // ── FORGOT PASSWORD ───────────────────────────────────────
  function handleForgot() {
    const email = document.getElementById('si-email').value.trim();
    const errEl = document.getElementById('si-error');
    const sucEl = document.getElementById('si-success');
    if (!email) { errEl.textContent = '⚠️ Enter your email above first.'; return; }
    auth.sendPasswordResetEmail(email)
      .then(() => { sucEl.textContent = '📧 Reset email sent! Check your inbox.'; errEl.textContent = ''; })
      .catch(err => { errEl.textContent = friendlyError(err.code); });
  }

  // ── ENTER KEY ─────────────────────────────────────────────
  document.addEventListener('keydown', function(e) {
    if (e.key !== 'Enter') return;
    const signupVisible = document.getElementById('signup-form').style.display !== 'none';
    if (signupVisible) handleSignUp(); else handleSignIn();
  });
</script>

</body>
</html>
